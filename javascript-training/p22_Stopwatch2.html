<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program_22</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
    <div id="sw"></div>
    <ol id="laps"></ol>
    <button id="st">Start</button>
    <button id="sp">Stop</button>
    <button id="rt">Reset</button>
    <button id="lp">Laps</button>
    
</body>
<script>
    let hh = 0;
    let mm = 0;
    let ss = 0;
    $(document).ready(function(){

        $('#st').click(function(){
            //alert("I am start")
            id = setInterval('updatesw()',1000);
        })
        $('#sp').click(function(){
            //alert("I am stop")
            clearInterval(id);
        });
        $('#rt').click(function(){
            //alert("I am reset")
            hh=0;
            mm=0;
            ss=0;
            clearInterval(id);
            $('#sw').text(hh+" : "+mm+" : "+ss);
            $('#laps').children('li').remove();
        });
        $('#lp').click(function(){
            //alert("New lap")
            $('#laps').append('<li>'+hh+' : '+mm+' : '+ss+'</li>');
        });
    });
    function updatesw(){
        ss++;
        if(ss>=60){
            mm++;
            ss=0;
        }
        if(mm>=60){
            hh++;
            mm=0;
            ss=0;
        }
        $('#sw').text(hh+" : "+mm+" : "+ss);
    }
</script>
</html>
