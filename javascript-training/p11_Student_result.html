<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(225, 225, 225);
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #dddddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        input[type="number"], input[type="text"] {
            width: 90%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            width: 100%;
        }
        .btn:hover {
            background-color: #218838;
        }
        .result-row {
            background-color: #e9ecef;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Student Result Declaration Form</h2>
        
        <table>
            <tr>
                <td colspan="2"><b>Student Name</b></td>
                <td><input type="text" id="studentName" placeholder="Enter Name"></td>
            </tr>
            <tr>
                <td colspan="2"><b>CU ID</b></td>
                <td><input type="text" id="cuId" placeholder="Enter CU ID"></td>
            </tr>
            <tr>
                <th>S.No</th>
                <th>Subject</th>
                <th>Marks (Out of 100)</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Python</td>
                <td><input type="number" id="m1" min="0" max="100" placeholder="0-100"></td>
            </tr>
            <tr>
                <td>2</td>
                <td>Operating System</td>
                <td><input type="number" id="m2" min="0" max="100" placeholder="0-100"></td>
            </tr>
            <tr>
                <td>3</td>
                <td>Java</td>
                <td><input type="number" id="m3" min="0" max="100" placeholder="0-100"></td>
            </tr>
            <tr>
                <td>4</td>
                <td>Web Designing</td>
                <td><input type="number" id="m4" min="0" max="100" placeholder="0-100"></td>
            </tr>
            <tr>
                <td>5</td>
                <td>C++</td>
                <td><input type="number" id="m5" min="0" max="100" placeholder="0-100"></td>
            </tr>
            <tr>
                <td>6</td>
                <td>Maths</td>
                <td><input type="number" id="m6" min="0" max="100" placeholder="0-100"></td>
            </tr>
            
            <!-- Result Output Rows -->
            <tr class="result-row">
                <td colspan="2">Total Marks (Obtained)</td>
                <td id="totalDisplay">0 / 600</td>
            </tr>
            <tr class="result-row">
                <td colspan="2">Percentage</td>
                <td id="percentDisplay">0%</td>
            </tr>
        </table>

        <button type="button" class="btn" onclick="calculateResult()">Generate Total & Percentage</button>
    </div>

<script>
    function calculateResult() {
        // Fetch all values and handle empty inputs by defaulting to 0
        let marks = [
            parseInt(document.getElementById('m1').value) || 0,
            parseInt(document.getElementById('m2').value) || 0,
            parseInt(document.getElementById('m3').value) || 0,
            parseInt(document.getElementById('m4').value) || 0,
            parseInt(document.getElementById('m5').value) || 0,
            parseInt(document.getElementById('m6').value) || 0
        ];

        // Validate if any marks exceed 100
        for (let i = 0; i < marks.length; i++) {
            if (marks[i] > 100 || marks[i] < 0) {
                alert("Please enter valid marks between 0 and 100.");
                return;
            }
        }

        // Calculate total
        let total = 0;
        for (let i = 0; i < marks.length; i++) {
            total += marks[i];
        }

        // Calculate percentage (Total obtained / Max Marks 600) * 100
        let percentage = (total / 600) * 100;

        // Display outcomes to the user interface
        document.getElementById('totalDisplay').innerText = total + " / 600";
        document.getElementById('percentDisplay').innerText = percentage.toFixed(2) + "%";
    }
</script>
</body>
</html>
