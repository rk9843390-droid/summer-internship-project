<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program_19</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .cls{
            height: 300px;
            width: 300px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="cls"></div>
    <button id="s">Start chains of method</button>
</body>
<script>
    $(document).ready(function(){
        $('#s').click(function(){
            $('.cls').hide(2000).show(2000).slideDown(5000);
        })
    })

</script>
</html>
